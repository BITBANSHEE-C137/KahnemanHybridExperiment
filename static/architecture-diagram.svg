<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b" />
      <stop offset="100%" style="stop-color:#0f172a" />
    </linearGradient>
    <filter id="softShadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow2" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="a2Cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
    <marker id="a2Amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="a2Purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="a2Gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="a2Green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="a2Red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bgGrad2)"/>
  <rect width="1200" height="750" fill="url(#grid2)" opacity="0.02"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="700" letter-spacing="1">DualProcessGPT2 — Architecture &amp; Training</text>
  <text x="600" y="62" text-anchor="middle" fill="#64748b" font-size="12" letter-spacing="2">JOINT TRAINING WITH SHARED WEIGHTS</text>

  <!-- ==================== LEFT COLUMN: MODEL ARCHITECTURE ==================== -->
  
  <!-- Section label -->
  <text x="300" y="95" text-anchor="middle" fill="#475569" font-size="11" font-weight="600" letter-spacing="2">MODEL ARCHITECTURE</text>
  <line x1="130" y1="102" x2="470" y2="102" stroke="#1e293b" stroke-width="1"/>

  <!-- Token Embeddings -->
  <rect x="175" y="115" width="250" height="42" rx="6" fill="url(#layerGrad)" stroke="#475569" stroke-width="1" filter="url(#softShadow2)"/>
  <text x="300" y="138" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">Token Embeddings</text>
  <text x="300" y="152" text-anchor="middle" fill="#64748b" font-size="9">wte (50,257 × 768) + wpe (1,024 × 768)</text>

  <!-- Arrow -->
  <line x1="300" y1="157" x2="300" y2="172" stroke="#64748b" stroke-width="1.5" marker-end="url(#a2Gray)"/>

  <!-- Transformer Blocks container -->
  <rect x="130" y="175" width="340" height="250" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="150" y="195" fill="#475569" font-size="10" font-weight="600" letter-spacing="1">× 12 TRANSFORMER BLOCKS</text>

  <!-- Block 1 (representative) -->
  <rect x="155" y="210" width="290" height="30" rx="5" fill="#1e293b" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="220" y="229" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">Multi-Head Attention</text>
  <text x="390" y="229" text-anchor="middle" fill="#64748b" font-size="9">12 heads</text>
  
  <!-- Attention mask indicator -->
  <rect x="160" y="247" width="130" height="22" rx="4" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="0.6"/>
  <text x="225" y="262" text-anchor="middle" fill="#06b6d4" font-size="9">Bidirectional (S1)</text>
  <rect x="300" y="247" width="130" height="22" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.6"/>
  <text x="365" y="262" text-anchor="middle" fill="#f59e0b" font-size="9">Causal Mask (S2)</text>

  <line x1="300" y1="270" x2="300" y2="282" stroke="#334155" stroke-width="1"/>

  <!-- LayerNorm + FFN -->
  <rect x="155" y="283" width="290" height="26" rx="5" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <text x="300" y="300" text-anchor="middle" fill="#94a3b8" font-size="10">LayerNorm → FFN (768 → 3072 → 768) → LayerNorm</text>

  <line x1="300" y1="310" x2="300" y2="322" stroke="#334155" stroke-width="1"/>

  <!-- Residual connection indicator -->
  <rect x="155" y="323" width="290" height="22" rx="5" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <text x="300" y="338" text-anchor="middle" fill="#64748b" font-size="9" font-style="italic">+ Residual Connections + Dropout</text>

  <!-- More blocks indicator -->
  <text x="300" y="365" text-anchor="middle" fill="#475569" font-size="20" letter-spacing="8">···</text>

  <!-- Block N -->
  <rect x="155" y="380" width="290" height="30" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.8"/>
  <text x="300" y="399" text-anchor="middle" fill="#94a3b8" font-size="10">Block 12 (Final Layer)</text>

  <!-- Arrow out of transformer -->
  <line x1="300" y1="425" x2="300" y2="445" stroke="#64748b" stroke-width="1.5" marker-end="url(#a2Gray)"/>

  <!-- Final LayerNorm -->
  <rect x="200" y="448" width="200" height="30" rx="5" fill="url(#layerGrad)" stroke="#475569" stroke-width="1"/>
  <text x="300" y="467" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="600">Final LayerNorm</text>

  <!-- Split into two outputs -->
  <!-- Left: LM Head -->
  <path d="M 260 478 L 200 505" stroke="#64748b" stroke-width="1.5" marker-end="url(#a2Gray)"/>
  <!-- Right: Confidence Head -->
  <path d="M 340 478 L 400 505" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a2Purple)"/>

  <!-- LM Head -->
  <rect x="105" y="508" width="190" height="40" rx="6" fill="url(#layerGrad)" stroke="#10b981" stroke-width="1.2" filter="url(#softShadow2)"/>
  <text x="200" y="528" text-anchor="middle" fill="#10b981" font-size="12" font-weight="600">LM Head</text>
  <text x="200" y="542" text-anchor="middle" fill="#64748b" font-size="9">Linear (768 → 50,257)</text>

  <!-- Confidence Head -->
  <rect x="305" y="508" width="190" height="40" rx="6" fill="url(#layerGrad)" stroke="#8b5cf6" stroke-width="1.2" filter="url(#softShadow2)"/>
  <text x="400" y="528" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="600">Confidence Head</text>
  <text x="400" y="542" text-anchor="middle" fill="#64748b" font-size="9">MLP (768→384→1) + Sigmoid</text>

  <!-- Outputs -->
  <line x1="200" y1="548" x2="200" y2="575" stroke="#10b981" stroke-width="1.5" marker-end="url(#a2Green)"/>
  <rect x="140" y="578" width="120" height="28" rx="5" fill="#064e3b" fill-opacity="0.5" stroke="#10b981" stroke-width="0.8"/>
  <text x="200" y="596" text-anchor="middle" fill="#10b981" font-size="11" font-weight="600">Logits</text>

  <line x1="400" y1="548" x2="400" y2="575" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#a2Purple)"/>
  <rect x="340" y="578" width="120" height="28" rx="5" fill="#1a0e2e" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="400" y="596" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Conf ∈ [0,1]</text>

  <!-- ==================== RIGHT COLUMN: TRAINING FLOW ==================== -->
  
  <!-- Section label -->
  <text x="850" y="95" text-anchor="middle" fill="#475569" font-size="11" font-weight="600" letter-spacing="2">TRAINING STEP</text>
  <line x1="620" y1="102" x2="1080" y2="102" stroke="#1e293b" stroke-width="1"/>

  <!-- Input batch -->
  <rect x="750" y="115" width="200" height="35" rx="6" fill="url(#layerGrad)" stroke="#475569" stroke-width="1"/>
  <text x="850" y="137" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">Batch (seq_len=512)</text>

  <!-- Split -->
  <path d="M 800 150 L 700 180" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#a2Cyan)"/>
  <path d="M 900 150 L 1000 180" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a2Amber)"/>

  <!-- System 1 Forward -->
  <rect x="610" y="183" width="180" height="80" rx="8" fill="#0a1628" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="700" y="206" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="700">System 1 Forward</text>
  <text x="700" y="224" text-anchor="middle" fill="#94a3b8" font-size="9">1. Mask tokens (t ~ U)</text>
  <text x="700" y="238" text-anchor="middle" fill="#94a3b8" font-size="9">2. Bidirectional attn</text>
  <text x="700" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">3. Predict masked tokens</text>

  <!-- System 2 Forward -->
  <rect x="910" y="183" width="180" height="80" rx="8" fill="#1a1005" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="1000" y="206" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">System 2 Forward</text>
  <text x="1000" y="224" text-anchor="middle" fill="#94a3b8" font-size="9">1. Causal attention mask</text>
  <text x="1000" y="238" text-anchor="middle" fill="#94a3b8" font-size="9">2. Left-to-right pass</text>
  <text x="1000" y="252" text-anchor="middle" fill="#94a3b8" font-size="9">3. Next-token prediction</text>

  <!-- Arrows down to losses -->
  <line x1="700" y1="263" x2="700" y2="300" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#a2Cyan)"/>
  <line x1="1000" y1="263" x2="1000" y2="300" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a2Amber)"/>
  
  <!-- Confidence output arrow -->
  <path d="M 700 263 L 700 280 Q 700 290 710 290 L 840 290 Q 850 290 850 300" 
        stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#a2Purple)" stroke-dasharray="4,2"/>

  <!-- Loss boxes -->
  <rect x="620" y="303" width="160" height="55" rx="6" fill="url(#layerGrad)" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="700" y="323" text-anchor="middle" fill="#06b6d4" font-size="11" font-weight="700">L_diff</text>
  <text x="700" y="339" text-anchor="middle" fill="#94a3b8" font-size="9">CrossEntropy on</text>
  <text x="700" y="351" text-anchor="middle" fill="#94a3b8" font-size="9">masked positions only</text>

  <rect x="770" y="303" width="160" height="55" rx="6" fill="url(#layerGrad)" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="850" y="323" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="700">L_conf</text>
  <text x="850" y="339" text-anchor="middle" fill="#94a3b8" font-size="9">BCE: did S1 predict</text>
  <text x="850" y="351" text-anchor="middle" fill="#94a3b8" font-size="9">each token correctly?</text>

  <rect x="920" y="303" width="160" height="55" rx="6" fill="url(#layerGrad)" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="1000" y="323" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">L_ar</text>
  <text x="1000" y="339" text-anchor="middle" fill="#94a3b8" font-size="9">CrossEntropy</text>
  <text x="1000" y="351" text-anchor="middle" fill="#94a3b8" font-size="9">next-token prediction</text>

  <!-- Arrows to combined loss -->
  <line x1="700" y1="358" x2="700" y2="385" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="850" y1="358" x2="850" y2="385" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="1000" y1="358" x2="1000" y2="385" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Combined Loss -->
  <rect x="650" y="388" width="400" height="45" rx="8" fill="#1e293b" stroke="#e2e8f0" stroke-width="1" filter="url(#softShadow2)"/>
  <text x="850" y="410" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">L = </text>
  <text x="850" y="410" text-anchor="middle" fill="#e2e8f0" font-size="13">
    <tspan fill="#f59e0b" font-weight="600">1.0</tspan><tspan fill="#94a3b8">·L</tspan><tspan fill="#f59e0b" font-size="10" baseline-shift="sub">ar</tspan>
    <tspan fill="#64748b"> + </tspan>
    <tspan fill="#06b6d4" font-weight="600">1.0</tspan><tspan fill="#94a3b8">·L</tspan><tspan fill="#06b6d4" font-size="10" baseline-shift="sub">diff</tspan>
    <tspan fill="#64748b"> + </tspan>
    <tspan fill="#8b5cf6" font-weight="600">0.1</tspan><tspan fill="#94a3b8">·L</tspan><tspan fill="#8b5cf6" font-size="10" baseline-shift="sub">conf</tspan>
  </text>
  <text x="850" y="427" text-anchor="middle" fill="#64748b" font-size="9">Single backward pass through shared weights</text>

  <!-- Arrow to optimizer -->
  <line x1="850" y1="433" x2="850" y2="458" stroke="#64748b" stroke-width="1.5" marker-end="url(#a2Gray)"/>

  <!-- Optimizer -->
  <rect x="720" y="461" width="260" height="40" rx="6" fill="url(#layerGrad)" stroke="#475569" stroke-width="1"/>
  <text x="850" y="482" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="600">AdamW (β₁=0.9, β₂=0.95)</text>
  <text x="850" y="496" text-anchor="middle" fill="#64748b" font-size="9">Cosine LR: 3e-4 → 3e-5 · grad clip 1.0</text>

  <!-- ==================== PARAMETER COUNT TABLE ==================== -->
  <rect x="620" y="530" width="460" height="140" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="850" y="553" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" letter-spacing="1">PARAMETER BREAKDOWN (GPT-2 SMALL)</text>
  
  <!-- Table rows -->
  <text x="650" y="578" fill="#94a3b8" font-size="11">Shared Transformer</text>
  <text x="1040" y="578" text-anchor="end" fill="#cbd5e1" font-size="11" font-weight="600">124M params</text>
  <line x1="650" y1="586" x2="1050" y2="586" stroke="#1e293b" stroke-width="0.5"/>

  <text x="650" y="604" fill="#8b5cf6" font-size="11">Confidence Head</text>
  <text x="1040" y="604" text-anchor="end" fill="#c4b5fd" font-size="11" font-weight="600">~295K params</text>
  <text x="1040" y="618" text-anchor="end" fill="#64748b" font-size="9">768→384 + 384→1</text>
  <line x1="650" y1="626" x2="1050" y2="626" stroke="#1e293b" stroke-width="0.5"/>

  <text x="650" y="644" fill="#cbd5e1" font-size="11" font-weight="600">Total (trainable)</text>
  <text x="1040" y="644" text-anchor="end" fill="#e2e8f0" font-size="11" font-weight="700">~124.3M params</text>
  <text x="1040" y="658" text-anchor="end" fill="#64748b" font-size="9">All parameters updated by joint loss</text>

  <!-- ==================== MODEL TIERS (bottom left) ==================== -->
  <rect x="80" y="630" width="480" height="100" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="320" y="653" text-anchor="middle" fill="#475569" font-size="10" font-weight="600" letter-spacing="1">MODEL TIERS</text>
  
  <!-- Active tier highlight -->
  <rect x="98" y="662" width="444" height="22" rx="3" fill="#06b6d4" fill-opacity="0.08"/>
  
  <text x="115" y="678" fill="#06b6d4" font-size="11" font-weight="700">▸ Tiny</text>
  <text x="200" y="678" fill="#94a3b8" font-size="10">GPT-2 Small</text>
  <text x="330" y="678" fill="#cbd5e1" font-size="10">124M · 12L · 768d · 12h</text>
  <text x="520" y="678" fill="#06b6d4" font-size="9" font-weight="600">← CURRENT</text>

  <text x="115" y="700" fill="#64748b" font-size="11">Small</text>
  <text x="200" y="700" fill="#64748b" font-size="10">GPT-2 Medium</text>
  <text x="330" y="700" fill="#64748b" font-size="10">355M · 24L · 1024d · 16h</text>

  <text x="115" y="720" fill="#64748b" font-size="11">Medium</text>
  <text x="200" y="720" fill="#64748b" font-size="10">GPT-2 Large</text>
  <text x="330" y="720" fill="#64748b" font-size="10">774M · 36L · 1280d · 20h</text>

</svg>