<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="s1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="s2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="confGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sharedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="flowGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Arrow markers -->
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06b6d4"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="960" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#fff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="960" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="#e2e8f0" font-size="26" font-weight="700" letter-spacing="1">Dual-Process Language Model</text>
  <text x="600" y="78" text-anchor="middle" fill="#64748b" font-size="14" letter-spacing="2">SYSTEM 1–LED ARCHITECTURE WITH CONFIDENCE-BASED ESCALATION</text>

  <!-- ==================== INPUT ==================== -->
  <rect x="460" y="105" width="280" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="600" y="135" text-anchor="middle" fill="#cbd5e1" font-size="15" font-weight="600">Input Tokens</text>

  <!-- Arrow: Input → Masking -->
  <line x1="600" y1="155" x2="600" y2="185" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ==================== MASKING LAYER ==================== -->
  <rect x="410" y="188" width="380" height="55" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4" filter="url(#softShadow)"/>
  <text x="600" y="212" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="600" letter-spacing="1">LLADA-STYLE MASKING</text>
  <text x="600" y="232" text-anchor="middle" fill="#94a3b8" font-size="11">Sample t ~ U(0.1, 1.0) · Replace fraction t with [MASK]</text>

  <!-- Arrow: Masking → Shared Transformer -->
  <line x1="600" y1="243" x2="600" y2="278" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ==================== SHARED TRANSFORMER (central) ==================== -->
  <rect x="340" y="280" width="520" height="100" rx="12" fill="url(#sharedGrad)" stroke="#475569" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="600" y="315" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Shared Transformer</text>
  <text x="600" y="338" text-anchor="middle" fill="#94a3b8" font-size="12">GPT-2 Backbone · All Layers · Embeddings · LM Head</text>
  <text x="600" y="358" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic">Same weights, different attention masks</text>
  
  <!-- Bidirectional label (left) -->
  <rect x="355" y="290" width="120" height="24" rx="4" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-width="0.8"/>
  <text x="415" y="306" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">BIDIRECTIONAL</text>
  
  <!-- Causal label (right) -->
  <rect x="725" y="290" width="120" height="24" rx="4" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="785" y="306" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">CAUSAL</text>

  <!-- ==================== SPLIT INTO TWO PATHS ==================== -->
  
  <!-- Left path arrow: Transformer → System 1 -->
  <path d="M 480 380 L 480 400 Q 480 415 465 415 L 300 415 Q 285 415 285 430 L 285 450" 
        stroke="#06b6d4" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)" stroke-opacity="0.8"/>
  
  <!-- Right invisible path (System 2 is below confidence gate) -->

  <!-- ==================== SYSTEM 1 BOX ==================== -->
  <rect x="110" y="453" width="350" height="110" rx="12" fill="#0a1628" stroke="#06b6d4" stroke-width="2" filter="url(#glowCyan)"/>
  
  <!-- S1 badge -->
  <rect x="125" y="465" width="28" height="28" rx="6" fill="#06b6d4"/>
  <text x="139" y="484" text-anchor="middle" fill="#0a0e1a" font-size="14" font-weight="800">S1</text>
  
  <text x="165" y="483" fill="#06b6d4" font-size="16" font-weight="700">System 1 — Diffusion</text>
  <text x="285" y="508" text-anchor="middle" fill="#94a3b8" font-size="12">Fast, parallel token generation</text>
  <text x="285" y="526" text-anchor="middle" fill="#64748b" font-size="11">Bidirectional attention · Predict all [MASK] simultaneously</text>
  <text x="285" y="544" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">DEFAULT MODE — generates first</text>

  <!-- ==================== Arrow: System 1 → Confidence Head ==================== -->
  <path d="M 460 508 L 520 508" stroke="#8b5cf6" stroke-width="2.5" fill="none" marker-end="url(#arrowPurple)" stroke-opacity="0.8"/>
  <text x="490" y="498" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">logits +</text>
  <text x="490" y="522" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">hidden states</text>

  <!-- ==================== CONFIDENCE HEAD (diamond/decision) ==================== -->
  <rect x="523" y="468" width="220" height="80" rx="12" fill="#1a0e2e" stroke="#8b5cf6" stroke-width="2" filter="url(#glowPurple)"/>
  
  <!-- Confidence badge -->
  <rect x="538" y="480" width="22" height="22" rx="5" fill="#8b5cf6"/>
  <text x="549" y="496" text-anchor="middle" fill="#0a0e1a" font-size="11" font-weight="800">C</text>
  
  <text x="572" y="496" fill="#8b5cf6" font-size="14" font-weight="700">Confidence Head</text>
  <text x="633" y="516" text-anchor="middle" fill="#94a3b8" font-size="11">2-layer MLP → score ∈ [0, 1]</text>
  <text x="633" y="533" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Per-token confidence</text>

  <!-- ==================== DECISION DIAMOND ==================== -->
  <polygon points="633,590 683,625 633,660 583,625" fill="#1e1235" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="633" y="621" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">mean(c)</text>
  <text x="633" y="635" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">≥ τ ?</text>

  <!-- Arrow: Confidence Head → Diamond -->
  <line x1="633" y1="548" x2="633" y2="588" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" stroke-opacity="0.7"/>

  <!-- ==================== YES PATH (left) → Output directly ==================== -->
  <path d="M 583 625 L 430 625 Q 415 625 415 640 L 415 720" 
        stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  
  <!-- Yes label -->
  <rect x="470" y="607" width="55" height="20" rx="4" fill="#064e3b"/>
  <text x="497" y="621" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">HIGH ✓</text>

  <!-- ==================== NO PATH (right) → System 2 ==================== -->
  <path d="M 683 625 L 830 625 Q 845 625 845 640 L 845 680" 
        stroke="#f59e0b" stroke-width="2.5" fill="none" marker-end="url(#arrowAmber)"/>
  
  <!-- No label -->
  <rect x="720" y="607" width="55" height="20" rx="4" fill="#451a03"/>
  <text x="747" y="621" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">LOW ✗</text>

  <!-- ==================== SYSTEM 2 BOX ==================== -->
  <rect x="680" y="683" width="330" height="110" rx="12" fill="#1a1005" stroke="#f59e0b" stroke-width="2" filter="url(#glowAmber)"/>
  
  <!-- S2 badge -->
  <rect x="695" y="695" width="28" height="28" rx="6" fill="#f59e0b"/>
  <text x="709" y="714" text-anchor="middle" fill="#1a1005" font-size="14" font-weight="800">S2</text>
  
  <text x="735" y="713" fill="#f59e0b" font-size="16" font-weight="700">System 2 — Autoregressive</text>
  <text x="845" y="738" text-anchor="middle" fill="#94a3b8" font-size="12">Slow, sequential token generation</text>
  <text x="845" y="756" text-anchor="middle" fill="#64748b" font-size="11">Causal attention · Standard left-to-right decoding</text>
  <text x="845" y="774" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">ESCALATION MODE — engages only when needed</text>

  <!-- Arrow: System 2 takes S1 partial output as prompt -->
  <text x="845" y="670" text-anchor="middle" fill="#fcd34d" font-size="9" font-style="italic" opacity="0.7">S1 partial output → prompt</text>

  <!-- Arrow: System 2 → Output -->
  <path d="M 845 793 L 845 845 Q 845 860 830 860 L 500 860 Q 485 860 485 845 L 485 775" 
        stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowAmber)" stroke-opacity="0.6"/>

  <!-- ==================== OUTPUT BOX ==================== -->
  <rect x="330" y="723" width="170" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#softShadow)"/>
  <text x="415" y="748" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">Output Tokens</text>
  <text x="415" y="763" text-anchor="middle" fill="#64748b" font-size="10">Final generation</text>

  <!-- ==================== TRAINING OBJECTIVE (bottom) ==================== -->
  <rect x="80" y="880" width="1040" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-opacity="0.5"/>
  <text x="600" y="903" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">Joint Training Objective</text>
  <text x="600" y="923" text-anchor="middle" fill="#64748b" font-size="12">
    <tspan fill="#f59e0b">L</tspan> = <tspan fill="#f59e0b">λ</tspan><tspan font-size="9" fill="#f59e0b" baseline-shift="sub">ar</tspan><tspan fill="#94a3b8"> · L</tspan><tspan font-size="9" fill="#94a3b8" baseline-shift="sub">ar</tspan>
    <tspan fill="#64748b">  +  </tspan>
    <tspan fill="#06b6d4">λ</tspan><tspan font-size="9" fill="#06b6d4" baseline-shift="sub">diff</tspan><tspan fill="#94a3b8"> · L</tspan><tspan font-size="9" fill="#94a3b8" baseline-shift="sub">diff</tspan>
    <tspan fill="#64748b">  +  </tspan>
    <tspan fill="#8b5cf6">λ</tspan><tspan font-size="9" fill="#8b5cf6" baseline-shift="sub">conf</tspan><tspan fill="#94a3b8"> · L</tspan><tspan font-size="9" fill="#94a3b8" baseline-shift="sub">conf</tspan>
  </text>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(50, 110)">
    <rect width="160" height="130" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" opacity="0.9"/>
    <rect x="15" y="15" width="12" height="12" rx="3" fill="#06b6d4"/>
    <text x="35" y="25" fill="#94a3b8" font-size="11">System 1 (Fast)</text>
    <rect x="15" y="38" width="12" height="12" rx="3" fill="#f59e0b"/>
    <text x="35" y="48" fill="#94a3b8" font-size="11">System 2 (Slow)</text>
    <rect x="15" y="61" width="12" height="12" rx="3" fill="#8b5cf6"/>
    <text x="35" y="71" fill="#94a3b8" font-size="11">Confidence Head</text>
    <rect x="15" y="84" width="12" height="12" rx="3" fill="#10b981"/>
    <text x="35" y="94" fill="#94a3b8" font-size="11">Output (High Conf)</text>
    <rect x="15" y="107" width="12" height="12" rx="3" fill="#475569"/>
    <text x="35" y="117" fill="#94a3b8" font-size="11">Shared Weights</text>
  </g>

  <!-- ==================== KEY INSIGHT callout ==================== -->
  <g transform="translate(950, 110)">
    <rect width="210" height="80" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1" opacity="0.9"/>
    <text x="15" y="22" fill="#e2e8f0" font-size="10" font-weight="700" letter-spacing="1">KEY INSIGHT</text>
    <text x="15" y="40" fill="#94a3b8" font-size="10">Both modes share identical</text>
    <text x="15" y="54" fill="#94a3b8" font-size="10">Transformer weights. Only the</text>
    <text x="15" y="68" fill="#94a3b8" font-size="10">attention mask changes.</text>
  </g>

</svg>