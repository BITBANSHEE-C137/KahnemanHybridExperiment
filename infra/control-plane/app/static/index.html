<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Lab Control Plane</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
/* ── Reset & Base ───────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--panel:#16213e;--header:#0f3460;--accent:#00d4ff;
  --text:#e0e0e0;--text-dim:#888;--danger:#ff4757;--success:#2ed573;
  --warning:#ffa502;--radius:8px;--gap:12px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--accent);text-decoration:none}

/* ── Toast ──────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 24px;border-radius:var(--radius);
  font-size:.9rem;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;
}
#toast.show{opacity:1}

/* ── Layout ─────────────────────────────────────────────────── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Status Bar ─────────────────────────────────────────────── */
.status-bar{
  display:flex;flex-wrap:wrap;align-items:center;gap:var(--gap);
  padding:10px 16px;background:var(--header);border-bottom:1px solid #223;
  min-height:52px;
}
.status-item{
  display:flex;align-items:center;gap:6px;font-size:.85rem;
  padding:4px 10px;background:var(--panel);border-radius:var(--radius);
  white-space:nowrap;
}
.status-item .label{color:var(--text-dim);font-size:.75rem;text-transform:uppercase}
.status-item .value{font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--success)}
.dot-red{background:var(--danger)}
.dot-yellow{background:var(--warning)}

.badge{
  display:inline-block;padding:2px 8px;border-radius:4px;
  font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
}
.badge-running{background:rgba(46,213,115,.2);color:var(--success)}
.badge-stopped{background:rgba(255,71,87,.2);color:var(--danger)}
.badge-unknown{background:rgba(255,165,2,.2);color:var(--warning)}

.status-bar .spacer{flex:1}

.btn-icon{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:var(--radius);font-size:.85rem;font-weight:600;
  min-width:44px;min-height:44px;justify-content:center;transition:background .15s;
}
.btn-accent{background:var(--accent);color:#000}
.btn-accent:hover{background:#33e0ff}
.btn-outline{border:1px solid var(--accent);color:var(--accent)}
.btn-outline:hover{background:rgba(0,212,255,.1)}

/* ── Claude Launcher Dropdown ───────────────────────────────── */
.claude-launcher{position:relative;display:inline-flex}
.claude-dropdown{
  display:none;position:absolute;top:100%;right:0;margin-top:4px;
  background:var(--panel);border:1px solid #334;border-radius:var(--radius);
  min-width:200px;z-index:100;overflow:hidden;
}
.claude-launcher.open .claude-dropdown{display:block}
.claude-dropdown button{
  display:block;width:100%;text-align:left;padding:10px 14px;
  font-size:.85rem;min-height:44px;transition:background .1s;
}
.claude-dropdown button:hover{background:rgba(0,212,255,.08)}
.claude-dropdown button .hint{color:var(--text-dim);font-size:.75rem;margin-top:2px}

/* ── Panels Container ───────────────────────────────────────── */
.panels{display:flex;flex:1;overflow:hidden}

/* ── Side Panel (Elevation + Instances) ─────────────────────── */
.side-panel{
  width:320px;min-width:280px;display:flex;flex-direction:column;
  border-right:1px solid #223;background:var(--panel);overflow:hidden;
  transition:width .2s,min-width .2s;
}
.side-panel.collapsed{width:0;min-width:0;border:none;overflow:hidden}

.panel-section{display:flex;flex-direction:column;overflow:hidden}
.panel-section.collapsed .panel-body{display:none}

.panel-header{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--header);cursor:pointer;user-select:none;
  font-size:.85rem;font-weight:600;min-height:44px;
}
.panel-header .chevron{transition:transform .2s;font-size:.7rem}
.panel-section.collapsed .panel-header .chevron{transform:rotate(-90deg)}
.panel-header .count{
  margin-left:auto;background:var(--accent);color:#000;
  border-radius:10px;padding:1px 8px;font-size:.7rem;font-weight:700;
}

.panel-body{flex:1;overflow-y:auto;padding:8px}

/* ── Elevation Cards ────────────────────────────────────────── */
.elev-card{
  background:var(--bg);border-radius:var(--radius);padding:10px 12px;
  margin-bottom:8px;font-size:.8rem;border-left:3px solid var(--accent);
}
.elev-card.pending{border-left-color:var(--warning)}
.elev-card.active{border-left-color:var(--success)}
.elev-card.done{border-left-color:var(--text-dim);opacity:.6}
.elev-card .elev-prompt{font-weight:600;margin-bottom:4px}
.elev-card .elev-meta{color:var(--text-dim);font-size:.72rem}

/* ── Instance Cards ─────────────────────────────────────────── */
.inst-card{
  background:var(--bg);border-radius:var(--radius);padding:10px 12px;
  margin-bottom:8px;font-size:.8rem;
}
.inst-card .inst-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.inst-card .inst-id{font-family:monospace;font-weight:600;font-size:.78rem}
.inst-card .inst-badge{
  padding:2px 6px;border-radius:4px;font-size:.65rem;font-weight:700;
  text-transform:uppercase;
}
.inst-badge-running{background:rgba(46,213,115,.2);color:var(--success)}
.inst-badge-healthy{background:rgba(46,213,115,.2);color:var(--success)}
.inst-badge-unhealthy{background:rgba(255,71,87,.2);color:var(--danger)}
.inst-card .inst-detail{
  display:grid;grid-template-columns:auto 1fr;gap:2px 10px;
  font-size:.75rem;color:var(--text-dim);margin-bottom:8px;
}
.inst-card .inst-detail .val{color:var(--text);font-family:monospace}
.inst-card .inst-actions{display:flex;gap:6px}
.inst-card .inst-actions button{
  flex:1;padding:6px 10px;border-radius:4px;font-size:.75rem;
  font-weight:600;min-height:36px;transition:background .15s;
}
.btn-ssh{background:rgba(0,212,255,.15);color:var(--accent)}
.btn-ssh:hover{background:rgba(0,212,255,.25)}
.btn-connect{background:var(--accent);color:#000}
.btn-connect:hover{background:#33e0ff}

/* ── Terminal Area ──────────────────────────────────────────── */
.terminal-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Tmux Tab Bar ───────────────────────────────────────────── */
.tab-bar{
  display:flex;align-items:stretch;background:var(--header);
  border-bottom:1px solid #223;padding:0 8px;min-height:38px;
  overflow-x:auto;flex-shrink:0;
}
.tab{
  display:flex;align-items:center;padding:6px 16px;font-size:.8rem;
  font-weight:600;color:var(--text-dim);border-bottom:2px solid transparent;
  cursor:pointer;white-space:nowrap;min-width:44px;min-height:38px;
  justify-content:center;transition:color .15s,border-color .15s;
  user-select:none;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ── Terminal Container ─────────────────────────────────────── */
.terminal-container{flex:1;position:relative;overflow:hidden}
#terminal{width:100%;height:100%}

/* ── Terminal Toolbar ───────────────────────────────────────── */
.terminal-toolbar{
  display:flex;align-items:center;gap:8px;padding:4px 8px;
  background:var(--header);border-top:1px solid #223;
}
.terminal-toolbar button{min-width:44px;min-height:36px}

/* ── Fullscreen ─────────────────────────────────────────────── */
.app.fullscreen .status-bar,
.app.fullscreen .side-panel,
.app.fullscreen .tab-bar,
.app.fullscreen .terminal-toolbar{display:none}
.app.fullscreen .terminal-area{flex:1}

/* ── Responsive ─────────────────────────────────────────────── */
@media(max-width:768px){
  .side-panel{width:260px;min-width:220px}
  .status-bar{padding:8px 10px;gap:8px}
  .status-item{font-size:.78rem;padding:4px 8px}
}
@media(max-width:600px){
  .panels{flex-direction:column}
  .side-panel{width:100%;min-width:100%;max-height:40vh;border-right:none;border-bottom:1px solid #223}
  .side-panel.collapsed{max-height:0}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ── Status Bar ─────────────────────────────────────────── -->
  <div class="status-bar">
    <div class="status-item" id="sb-health" title="Control plane API health">
      <span class="status-dot dot-red" id="health-dot"></span>
      <span class="label">API</span>
    </div>
    <div class="status-item" id="sb-fleet">
      <span class="label">Fleet</span>
      <span class="value" id="fleet-state">--</span>
    </div>
    <div class="status-item" id="sb-instances">
      <span class="label">Instances</span>
      <span class="value" id="instance-count">--</span>
    </div>
    <div class="status-item" id="sb-spot">
      <span class="label">Spot $/hr</span>
      <span class="value" id="spot-price">--</span>
    </div>
    <div class="status-item" id="sb-training">
      <span class="label">Training</span>
      <span class="value" id="training-badge"><span class="badge badge-unknown">UNKNOWN</span></span>
    </div>
    <div class="status-item" id="sb-step">
      <span class="label">Step</span>
      <span class="value" id="training-step">--</span>
    </div>
    <div class="status-item" id="sb-ar-loss">
      <span class="label">AR Loss</span>
      <span class="value" id="ar-loss">--</span>
    </div>
    <div class="status-item" id="sb-diff-loss">
      <span class="label">Diff Loss</span>
      <span class="value" id="diff-loss">--</span>
    </div>
    <div class="status-item" id="sb-cost">
      <span class="label">Cost</span>
      <span class="value" id="cost-value">--</span>
    </div>

    <div class="spacer"></div>

    <!-- Claude Launcher -->
    <div class="claude-launcher" id="claude-launcher">
      <button class="btn-icon btn-accent" id="btn-claude" title="Launch Claude Code">
        &#9889; Claude
      </button>
      <div class="claude-dropdown">
        <button id="btn-claude-here" title="Launch Claude in current pane">
          Launch in current pane
          <div class="hint">Sends <code>claude</code> to active pane</div>
        </button>
        <button id="btn-claude-new" title="Launch Claude in new tmux window">
          Launch in new window
          <div class="hint">Creates tmux window, then runs <code>claude</code></div>
        </button>
      </div>
    </div>

    <button class="btn-icon btn-outline" id="btn-panel-toggle" title="Toggle side panel">
      &#9776;
    </button>
    <button class="btn-icon btn-outline" id="btn-fullscreen" title="Toggle fullscreen">
      &#x26F6;
    </button>
  </div>

  <!-- ── Main Panels ────────────────────────────────────────── -->
  <div class="panels">

    <!-- Side Panel -->
    <div class="side-panel" id="side-panel">

      <!-- Elevation Panel -->
      <div class="panel-section" id="elevation-section">
        <div class="panel-header" data-toggle="elevation-section">
          <span class="chevron">&#9660;</span>
          Elevations
          <span class="count" id="elev-count">0</span>
        </div>
        <div class="panel-body" id="elevation-body">
          <div id="elev-pending"></div>
          <div id="elev-active"></div>
          <div id="elev-history"></div>
        </div>
      </div>

      <!-- Instances Panel -->
      <div class="panel-section" id="instances-section">
        <div class="panel-header" data-toggle="instances-section">
          <span class="chevron">&#9660;</span>
          GPU Instances
          <span class="count" id="inst-count">0</span>
        </div>
        <div class="panel-body" id="instances-body">
          <div id="inst-list"></div>
        </div>
      </div>

    </div>

    <!-- Terminal Area -->
    <div class="terminal-area">
      <!-- Tmux Tab Bar -->
      <div class="tab-bar" id="tab-bar">
        <div class="tab active" data-window="0">claude-code</div>
        <div class="tab" data-window="1">monitor</div>
        <div class="tab" data-window="2">shell</div>
      </div>

      <!-- Terminal -->
      <div class="terminal-container">
        <div id="terminal"></div>
      </div>

      <!-- Terminal Toolbar -->
      <div class="terminal-toolbar">
        <button class="btn-icon btn-outline" id="btn-clear" title="Send clear command">Clear</button>
        <div class="spacer" style="flex:1"></div>
        <button class="btn-icon btn-outline" id="btn-fullscreen2" title="Toggle fullscreen">&#x26F6; Fullscreen</button>
      </div>
    </div>

  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- xterm.js -->
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>

<script>
/* ── Utilities ──────────────────────────────────────────────── */

function escHtml(str) {
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}

function showToast(msg, duration) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove("show"), duration || 2500);
}

async function apiFetch(path, opts) {
  try {
    opts = opts || {};
    opts.credentials = "include";
    const r = await fetch(path, opts);
    if (!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } catch (e) {
    console.error("apiFetch error:", path, e);
    return null;
  }
}


/* ── Terminal Setup ─────────────────────────────────────────── */

const term = new Terminal({
  cursorBlink: true,
  fontSize: 14,
  fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', monospace",
  theme: {
    background: "#1a1a2e",
    foreground: "#e0e0e0",
    cursor: "#00d4ff",
    selectionBackground: "rgba(0,212,255,0.25)",
  },
  allowProposedApi: true,
});

const fitAddon = new FitAddon.FitAddon();
const webLinksAddon = new WebLinksAddon.WebLinksAddon();
term.loadAddon(fitAddon);
term.loadAddon(webLinksAddon);

let ws = null;
let wsReconnectTimer = null;

function connectTerminal() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const url = proto + "//" + location.host + "/terminal/ws";
  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  ws.addEventListener("open", function() {
    console.log("WebSocket connected");
    fitAddon.fit();
  });

  ws.addEventListener("message", function(evt) {
    const data = new Uint8Array(evt.data);
    // ttyd protocol: type byte 0 = output
    if (data.length > 0 && data[0] === 0) {
      term.write(data.slice(1));
    }
    // type byte 1 = set window title (ignored)
  });

  ws.addEventListener("close", function() {
    console.warn("WebSocket closed, reconnecting in 3s...");
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = setTimeout(connectTerminal, 3000);
  });

  ws.addEventListener("error", function() {
    ws.close();
  });
}

function sendTerminalInput(text) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  var encoded = new TextEncoder().encode(text);
  var buf = new Uint8Array(encoded.length + 1);
  buf[0] = 0;
  buf.set(encoded, 1);
  ws.send(buf);
}

function sendTerminalResize(cols, rows) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  // ttyd resize message: type 1 + JSON
  var payload = JSON.stringify({ columns: cols, rows: rows });
  var encoded = new TextEncoder().encode(payload);
  var buf = new Uint8Array(encoded.length + 1);
  buf[0] = 1;
  buf.set(encoded, 1);
  ws.send(buf);
}

// Mount terminal
var termEl = document.getElementById("terminal");
term.open(termEl);
fitAddon.fit();
connectTerminal();

// Forward keyboard input to WebSocket
term.onData(function(data) { sendTerminalInput(data); });
term.onResize(function(size) { sendTerminalResize(size.cols, size.rows); });

// Resize observer
var ro = new ResizeObserver(function() {
  try { fitAddon.fit(); } catch(e) {}
});
ro.observe(termEl);


/* ── Tmux Tab Switching ─────────────────────────────────────── */

var activeTab = 0;

function switchTmuxWindow(windowIndex) {
  // Send Ctrl-B (tmux prefix) then window number
  sendTerminalInput("\x02" + String(windowIndex));
  activeTab = windowIndex;
  var tabs = document.querySelectorAll(".tab-bar .tab");
  for (var i = 0; i < tabs.length; i++) {
    var win = parseInt(tabs[i].getAttribute("data-window"));
    if (win === windowIndex) {
      tabs[i].classList.add("active");
    } else {
      tabs[i].classList.remove("active");
    }
  }
}

document.getElementById("tab-bar").addEventListener("click", function(e) {
  var tab = e.target.closest(".tab");
  if (!tab) return;
  var win = parseInt(tab.getAttribute("data-window"));
  if (!isNaN(win)) switchTmuxWindow(win);
});


/* ── Claude Launcher ────────────────────────────────────────── */

var launcher = document.getElementById("claude-launcher");
var btnClaude = document.getElementById("btn-claude");

btnClaude.addEventListener("click", function(e) {
  e.stopPropagation();
  launcher.classList.toggle("open");
});

document.addEventListener("click", function(e) {
  if (!launcher.contains(e.target)) launcher.classList.remove("open");
});

document.getElementById("btn-claude-here").addEventListener("click", function() {
  launcher.classList.remove("open");
  sendTerminalInput("claude\n");
  showToast("Launching Claude Code...");
});

document.getElementById("btn-claude-new").addEventListener("click", function() {
  launcher.classList.remove("open");
  // tmux new-window: Ctrl-B c
  sendTerminalInput("\x02c");
  setTimeout(function() { sendTerminalInput("claude\n"); }, 500);
  showToast("Launching Claude Code in new window...");
});


/* ── Fullscreen Toggle ──────────────────────────────────────── */

function toggleFullscreen() {
  document.getElementById("app").classList.toggle("fullscreen");
  setTimeout(function() { try { fitAddon.fit(); } catch(e) {} }, 100);
}

document.getElementById("btn-fullscreen").addEventListener("click", toggleFullscreen);
document.getElementById("btn-fullscreen2").addEventListener("click", toggleFullscreen);


/* ── Side Panel Toggle ──────────────────────────────────────── */

document.getElementById("btn-panel-toggle").addEventListener("click", function() {
  document.getElementById("side-panel").classList.toggle("collapsed");
  setTimeout(function() { try { fitAddon.fit(); } catch(e) {} }, 200);
});


/* ── Collapsible Panel Sections ─────────────────────────────── */

var panelHeaders = document.querySelectorAll(".panel-header[data-toggle]");
for (var h = 0; h < panelHeaders.length; h++) {
  (function(hdr) {
    hdr.addEventListener("click", function() {
      var sectionId = hdr.getAttribute("data-toggle");
      document.getElementById(sectionId).classList.toggle("collapsed");
    });
  })(panelHeaders[h]);
}


/* ── Clear Button ───────────────────────────────────────────── */

document.getElementById("btn-clear").addEventListener("click", function() {
  sendTerminalInput("clear\n");
});


/* ── Status Polling ─────────────────────────────────────────── */

var lastStatus = null;

async function pollStatus() {
  var data = await apiFetch("/api/lab/status");
  var healthDot = document.getElementById("health-dot");

  if (!data) {
    healthDot.className = "status-dot dot-red";
    return;
  }

  healthDot.className = "status-dot dot-green";
  lastStatus = data;

  // Fleet
  var fleet = data.fleet || {};
  document.getElementById("fleet-state").textContent = fleet.state || "--";

  var instances = fleet.instances || [];
  var running = 0;
  for (var i = 0; i < instances.length; i++) {
    if (instances[i].state === "running" || instances[i].health === "healthy") {
      running++;
    }
  }
  document.getElementById("instance-count").textContent = running + "/" + instances.length;

  // Spot price from first instance with a price
  var firstSpot = null;
  for (var j = 0; j < instances.length; j++) {
    if (instances[j].spot_price) { firstSpot = instances[j]; break; }
  }
  document.getElementById("spot-price").textContent = firstSpot
    ? "$" + parseFloat(firstSpot.spot_price).toFixed(3)
    : "--";

  // Training
  var training = data.training || {};
  var tStatus = (training.status || "unknown").toLowerCase();
  var badgeEl = document.getElementById("training-badge");
  if (tStatus === "running" || tStatus === "active") {
    badgeEl.innerHTML = '<span class="badge badge-running">RUNNING</span>';
  } else if (tStatus === "stopped" || tStatus === "completed") {
    badgeEl.innerHTML = '<span class="badge badge-stopped">STOPPED</span>';
  } else {
    badgeEl.innerHTML = '<span class="badge badge-unknown">UNKNOWN</span>';
  }

  document.getElementById("training-step").textContent =
    training.step != null ? Number(training.step).toLocaleString() : "--";
  document.getElementById("ar-loss").textContent =
    training.ar_loss != null ? parseFloat(training.ar_loss).toFixed(2) : "--";
  document.getElementById("diff-loss").textContent =
    training.diff_loss != null ? parseFloat(training.diff_loss).toFixed(2) : "--";

  // Cost
  var cost = data.cost || {};
  var spent = cost.total_spent != null ? cost.total_spent : cost.spent;
  var budget = cost.budget;
  if (spent != null) {
    document.getElementById("cost-value").textContent = budget
      ? "$" + parseFloat(spent).toFixed(2) + " / $" + parseFloat(budget).toFixed(0)
      : "$" + parseFloat(spent).toFixed(2);
  } else {
    document.getElementById("cost-value").textContent = "--";
  }

  // Instance count badge in side panel
  document.getElementById("inst-count").textContent = instances.length;

  // Render instance cards
  renderInstances(instances);
}

function renderInstances(instances) {
  var container = document.getElementById("inst-list");
  if (!instances.length) {
    container.innerHTML =
      '<div style="color:var(--text-dim);font-size:.8rem;padding:8px">No active instances</div>';
    return;
  }

  var html = "";
  for (var i = 0; i < instances.length; i++) {
    var inst = instances[i];
    var id = escHtml(inst.instance_id || "--");
    var shortId = id.length > 10 ? id.slice(0, 5) + "..." + id.slice(-5) : id;
    var itype = escHtml(inst.instance_type || "--");
    var az = escHtml(inst.az || "--");
    var ip = inst.public_ip || "";
    var price = inst.spot_price
      ? "$" + parseFloat(inst.spot_price).toFixed(3) + "/hr"
      : "--";
    var health = (inst.health || "").toLowerCase();
    var state = (inst.state || "").toLowerCase();

    var badgeClass = "inst-badge-running";
    var badgeText = state || health || "unknown";
    if (health === "unhealthy" || state === "terminated" || state === "shutting-down") {
      badgeClass = "inst-badge-unhealthy";
    }

    html += '<div class="inst-card">'
      + '<div class="inst-header">'
      + '<span class="inst-id" title="' + id + '">' + shortId + '</span>'
      + '<span class="inst-badge ' + badgeClass + '">' + escHtml(badgeText) + '</span>'
      + '</div>'
      + '<div class="inst-detail">'
      + '<span>Type</span><span class="val">' + itype + '</span>'
      + '<span>AZ</span><span class="val">' + az + '</span>'
      + '<span>IP</span><span class="val">' + escHtml(ip || "--") + '</span>'
      + '<span>Spot</span><span class="val">' + price + '</span>'
      + '</div>'
      + '<div class="inst-actions">'
      + '<button class="btn-ssh" onclick="copySSH(\'' + escHtml(ip) + '\')"'
      + (ip ? '' : ' disabled') + '>Copy SSH</button>'
      + '<button class="btn-connect" onclick="connectSSH(\'' + escHtml(ip) + '\')"'
      + (ip ? '' : ' disabled') + '>Connect</button>'
      + '</div>'
      + '</div>';
  }
  container.innerHTML = html;
}

function copySSH(ip) {
  if (!ip) return;
  var cmd = "ssh -i ~/.ssh/gpu-key.pem ubuntu@" + ip;
  navigator.clipboard.writeText(cmd).then(
    function() { showToast("SSH command copied to clipboard"); },
    function() { showToast("Failed to copy to clipboard"); }
  );
}

function connectSSH(ip) {
  if (!ip) return;
  var cmd = "ssh -i ~/.ssh/gpu-key.pem ubuntu@" + ip + "\n";
  sendTerminalInput(cmd);
  showToast("Connecting to " + ip + "...");
}


/* ── Elevation Polling ──────────────────────────────────────── */

async function pollElevations() {
  var results = await Promise.allSettled([
    apiFetch("/api/elevation/pending"),
    apiFetch("/api/elevation/active"),
    apiFetch("/api/elevation/history"),
  ]);

  var pending = (results[0].status === "fulfilled" && Array.isArray(results[0].value)) ? results[0].value : [];
  var activeData = (results[1].status === "fulfilled" && results[1].value) ? results[1].value : {};
  var active = activeData.id ? [activeData] : [];
  var history = (results[2].status === "fulfilled" && Array.isArray(results[2].value)) ? results[2].value.slice(0, 10) : [];

  document.getElementById("elev-count").textContent = pending.length + active.length;

  document.getElementById("elev-pending").innerHTML = pending.length
    ? '<div style="color:var(--text-dim);font-size:.7rem;padding:0 0 4px;text-transform:uppercase">Pending</div>'
      + pending.map(function(e) { return elevCard(e, "pending"); }).join("")
    : "";

  document.getElementById("elev-active").innerHTML = active.length
    ? '<div style="color:var(--text-dim);font-size:.7rem;padding:4px 0;text-transform:uppercase">Active</div>'
      + active.map(function(e) { return elevCard(e, "active"); }).join("")
    : "";

  document.getElementById("elev-history").innerHTML = history.length
    ? '<div style="color:var(--text-dim);font-size:.7rem;padding:4px 0;text-transform:uppercase">History</div>'
      + history.map(function(e) { return elevCard(e, "done"); }).join("")
    : "";
}

function elevCard(elev, cls) {
  var action = escHtml(elev.action || "");
  var justification = escHtml(elev.justification || "");
  var dur = elev.duration_minutes ? elev.duration_minutes + "m" : "";
  var decidedBy = elev.decided_by ? "by " + escHtml(elev.decided_by) : "";

  // Active session: show expiry countdown
  var extra = "";
  if (cls === "active" && elev.expires_at) {
    var remaining = Math.max(0, (new Date(elev.expires_at).getTime() - Date.now()) / 1000);
    var mins = Math.floor(remaining / 60);
    var secs = Math.floor(remaining % 60);
    extra = ' <span style="color:var(--warning);font-weight:600">' + mins + 'm ' + secs + 's left</span>';
  }

  // Pending: show approve/deny buttons
  var buttons = "";
  if (cls === "pending" && elev.id) {
    buttons = '<div style="display:flex;gap:6px;margin-top:6px">'
      + '<button style="flex:1;padding:6px 10px;border-radius:4px;font-size:.75rem;font-weight:600;min-height:36px;background:rgba(46,213,115,.3);color:var(--success);border:none;cursor:pointer" onclick="approveElev(\'' + escHtml(elev.id) + '\')">Approve</button>'
      + '<button style="flex:1;padding:6px 10px;border-radius:4px;font-size:.75rem;font-weight:600;min-height:36px;background:rgba(255,71,87,.3);color:var(--danger);border:none;cursor:pointer" onclick="denyElev(\'' + escHtml(elev.id) + '\')">Deny</button>'
      + '</div>';
  }

  return '<div class="elev-card ' + cls + '">'
    + '<div class="elev-prompt">' + (action || "(no action)") + (dur ? ' <span style="color:var(--text-dim)">(' + dur + ')</span>' : '') + '</div>'
    + '<div class="elev-meta">' + justification + ' ' + decidedBy + extra + '</div>'
    + buttons
    + '</div>';
}

async function approveElev(id) {
  var res = await apiFetch("/api/elevation/approve/" + id, { method: "POST" });
  if (res) {
    showToast("Elevation approved");
    pollElevations();
  }
}

async function denyElev(id) {
  var res = await apiFetch("/api/elevation/deny/" + id, { method: "POST" });
  if (res) {
    showToast("Elevation denied");
    pollElevations();
  }
}


/* ── Poll Loop ──────────────────────────────────────────────── */

async function poll() {
  await Promise.allSettled([pollStatus(), pollElevations()]);
}

poll();
setInterval(poll, 15000);


/* ── Keyboard Shortcuts ─────────────────────────────────────── */

document.addEventListener("keydown", function(e) {
  // Ctrl+Shift+F = fullscreen
  if (e.ctrlKey && e.shiftKey && e.key === "F") {
    e.preventDefault();
    toggleFullscreen();
  }
  // Escape exits fullscreen
  if (e.key === "Escape" && document.getElementById("app").classList.contains("fullscreen")) {
    toggleFullscreen();
  }
});
</script>
