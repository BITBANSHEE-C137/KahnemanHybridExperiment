<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ML Lab Control Plane</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      background: #1a1a2e; color: #e0e0e0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, monospace;
      font-size: 16px;
      overflow: hidden;
    }

    #app {
      display: flex; flex-direction: column;
      height: 100vh; width: 100vw;
    }

    /* --- Status Bar --- */
    #status-bar {
      display: flex; align-items: center; justify-content: space-evenly;
      background: #16213e; min-height: 40px; padding: 4px 8px;
      flex-shrink: 0; gap: 8px; flex-wrap: wrap;
    }
    .status-item {
      font-size: 14px; white-space: nowrap;
    }
    .status-item .label { color: #888; }
    .status-item .value { font-weight: 600; }
    .status-green  .value { color: #00c853; }
    .status-yellow .value { color: #ffd600; }
    .status-red    .value { color: #ff1744; }

    /* --- Elevation Panel --- */
    #elevation-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #0f3460; padding: 8px 12px; cursor: pointer;
      flex-shrink: 0; user-select: none;
      border-bottom: 1px solid #1a1a2e;
    }
    #elevation-header h2 { font-size: 16px; font-weight: 600; }
    .badge {
      background: #ff1744; color: #fff; border-radius: 10px;
      padding: 2px 8px; font-size: 13px; font-weight: 700;
      margin-left: 8px; display: none;
    }
    .badge.visible { display: inline-block; }
    #elevation-body {
      background: #0f3460; padding: 8px 12px; overflow-y: auto;
      max-height: 150px; flex-shrink: 0;
      border-bottom: 1px solid #1a1a2e;
    }
    #elevation-body.collapsed { display: none; }

    .elev-section-title { font-size: 13px; color: #888; margin: 4px 0 2px; text-transform: uppercase; }

    /* Request cards */
    .request-card {
      display: flex; align-items: center; justify-content: space-between;
      background: #16213e; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
    }
    .request-info { flex: 1; font-size: 14px; }
    .request-info .role { color: #00d4ff; font-weight: 600; }
    .request-actions { display: flex; gap: 8px; }
    .btn {
      min-width: 44px; min-height: 44px; border: none; border-radius: 6px;
      font-size: 15px; font-weight: 700; cursor: pointer; padding: 6px 14px;
      color: #fff;
    }
    .btn-approve { background: #00c853; }
    .btn-deny    { background: #ff1744; }
    .btn:active  { opacity: 0.7; }

    /* Active session */
    .active-session {
      background: #16213e; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
      font-size: 14px;
    }
    .active-session .role { color: #00d4ff; font-weight: 600; }
    .active-session .timer { color: #ffd600; font-weight: 600; }

    /* History */
    .history-entry { font-size: 13px; color: #999; padding: 2px 0; }

    /* --- Terminal --- */
    #terminal-container {
      flex: 1; overflow: hidden; position: relative;
    }
    #terminal-container .xterm { height: 100%; }

    /* Full-screen toggle */
    #fs-toggle {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      width: 48px; height: 48px; border-radius: 50%;
      background: #00d4ff; color: #1a1a2e; border: none;
      font-size: 22px; cursor: pointer; line-height: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    #fs-toggle:active { opacity: 0.7; }

    body.fullscreen #status-bar,
    body.fullscreen #elevation-header,
    body.fullscreen #elevation-body { display: none !important; }
    body.fullscreen #terminal-container { height: 100vh; }

    /* --- Toast --- */
    #toast {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: #ff1744; color: #fff; padding: 8px 18px;
      border-radius: 8px; font-size: 14px; z-index: 2000;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    #toast.visible { opacity: 1; pointer-events: auto; }

    /* Responsive */
    @media (max-width: 768px) {
      #elevation-body { max-height: 200px; }
      .status-item { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Status Bar -->
    <div id="status-bar">
      <div class="status-item" id="si-fleet">
        <span class="label">Fleet </span><span class="value">--</span>
      </div>
      <div class="status-item" id="si-instances">
        <span class="label">Inst </span><span class="value">--</span>
      </div>
      <div class="status-item" id="si-step">
        <span class="label">Step </span><span class="value">--</span>
      </div>
      <div class="status-item" id="si-cost">
        <span class="label">Cost </span><span class="value">--</span>
      </div>
    </div>

    <!-- Elevation Panel -->
    <div id="elevation-header" onclick="toggleElevation()">
      <h2>Elevation <span class="badge" id="pending-badge">0</span></h2>
      <span id="elev-arrow">&#9660;</span>
    </div>
    <div id="elevation-body" class="collapsed">
      <div class="elev-section-title">Pending</div>
      <div id="pending-list"><span style="color:#666">None</span></div>
      <div class="elev-section-title">Active</div>
      <div id="active-session"><span style="color:#666">None</span></div>
      <div class="elev-section-title">History</div>
      <div id="elevation-history"><span style="color:#666">None</span></div>
    </div>

    <!-- Terminal -->
    <div id="terminal-container"></div>
  </div>

  <!-- Full-screen toggle -->
  <button id="fs-toggle" onclick="toggleFullscreen()" title="Toggle fullscreen">&#x26F6;</button>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    // =========================================================================
    // Utility
    // =========================================================================
    function formatDuration(seconds) {
      if (seconds < 0) seconds = 0;
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return h + 'h ' + m + 'm';
      return m + 'm ' + s + 's';
    }

    function formatCost(dollars) {
      return '$' + Number(dollars).toFixed(2);
    }

    let toastTimer = null;
    function showToast(msg, duration) {
      duration = duration || 4000;
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { el.classList.remove('visible'); }, duration);
    }

    async function apiFetch(path, opts) {
      opts = opts || {};
      opts.credentials = 'include';
      try {
        const resp = await fetch(path, opts);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return await resp.json();
      } catch (e) {
        showToast('API error: ' + e.message);
        return null;
      }
    }

    // =========================================================================
    // Terminal (xterm.js + ttyd WebSocket)
    // =========================================================================
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 16,
      fontFamily: "'Menlo', 'DejaVu Sans Mono', 'Consolas', monospace",
      theme: {
        background: '#1a1a2e',
        foreground: '#e0e0e0',
        cursor: '#00d4ff',
        selectionBackground: '#264f78'
      },
      allowProposedApi: true
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);

    const termEl = document.getElementById('terminal-container');
    term.open(termEl);
    fitAddon.fit();

    let ws = null;
    let reconnectDelay = 1000;
    const MAX_RECONNECT = 30000;

    function connectTerminal() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = proto + '//' + window.location.host + '/terminal/ws';
      ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        reconnectDelay = 1000;
        sendResize();
      };

      ws.onmessage = function(ev) {
        const data = new Uint8Array(ev.data);
        if (data.length < 1) return;
        const msgType = data[0];
        const payload = data.slice(1);
        switch (msgType) {
          case 0: // output
            term.write(payload);
            break;
          case 1: // set window title
            document.title = new TextDecoder().decode(payload) || 'ML Lab Control Plane';
            break;
          case 2: // preferences (ignore)
            break;
        }
      };

      ws.onclose = function() {
        scheduleReconnect();
      };

      ws.onerror = function() {
        if (ws) ws.close();
      };
    }

    function scheduleReconnect() {
      setTimeout(function() {
        connectTerminal();
        reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT);
      }, reconnectDelay);
    }

    function sendResize() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const msg = '1' + JSON.stringify({ columns: term.cols, rows: term.rows });
      ws.send(new TextEncoder().encode(msg));
    }

    term.onData(function(data) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const buf = new Uint8Array(data.length + 1);
      buf[0] = 0; // input type
      const encoded = new TextEncoder().encode(data);
      buf.set(encoded, 1);
      ws.send(buf);
    });

    term.onResize(function() {
      sendResize();
    });

    window.addEventListener('resize', function() {
      fitAddon.fit();
    });

    connectTerminal();

    // =========================================================================
    // Elevation Panel
    // =========================================================================
    let elevationOpen = false;

    function toggleElevation() {
      elevationOpen = !elevationOpen;
      const body = document.getElementById('elevation-body');
      const arrow = document.getElementById('elev-arrow');
      if (elevationOpen) {
        body.classList.remove('collapsed');
        arrow.innerHTML = '&#9650;';
      } else {
        body.classList.add('collapsed');
        arrow.innerHTML = '&#9660;';
      }
      setTimeout(function() { fitAddon.fit(); }, 50);
    }

    async function pollPending() {
      const data = await apiFetch('/api/elevation/pending');
      const listEl = document.getElementById('pending-list');
      const badge = document.getElementById('pending-badge');
      if (!data || !Array.isArray(data) || data.length === 0) {
        listEl.innerHTML = '<span style="color:#666">None</span>';
        badge.textContent = '0';
        badge.classList.remove('visible');
        return;
      }
      badge.textContent = data.length;
      badge.classList.add('visible');
      listEl.innerHTML = data.map(function(r) {
        return '<div class="request-card">'
          + '<div class="request-info">'
          + '<span class="role">' + escHtml(r.action || '') + '</span> &mdash; '
          + escHtml(r.justification || 'No reason')
          + ' <span style="color:#666">(' + r.duration_minutes + 'm)</span>'
          + '</div>'
          + '<div class="request-actions">'
          + '<button class="btn btn-approve" onclick="approveElev(\'' + r.id + '\')">Approve</button>'
          + '<button class="btn btn-deny" onclick="denyElev(\'' + r.id + '\')">Deny</button>'
          + '</div></div>';
      }).join('');
    }

    async function pollActive() {
      const data = await apiFetch('/api/elevation/active');
      const el = document.getElementById('active-session');
      if (!data || !data.id) {
        el.innerHTML = '<span style="color:#666">None</span>';
        return;
      }
      const expiresAt = data.expires_at ? new Date(data.expires_at).getTime() / 1000 : 0;
      const remaining = Math.max(0, expiresAt - Date.now() / 1000);
      el.innerHTML = '<div class="active-session">'
        + '<span class="role">LabAdminRole</span>'
        + ' &mdash; <strong>' + escHtml(data.action || '') + '</strong>'
        + ' &mdash; approved by <strong>' + escHtml(data.decided_by || '?') + '</strong>'
        + ' &mdash; <span class="timer">' + formatDuration(remaining) + ' left</span>'
        + '</div>';
    }

    async function approveElev(id) {
      const res = await apiFetch('/api/elevation/approve/' + id, { method: 'POST' });
      if (res) {
        showToast('Approved', 2000);
        pollPending();
        pollActive();
      }
    }

    async function denyElev(id) {
      const res = await apiFetch('/api/elevation/deny/' + id, { method: 'POST' });
      if (res) {
        showToast('Denied', 2000);
        pollPending();
      }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Active session countdown (every 1s)
    setInterval(pollActive, 1000);
    // Pending poll (every 10s)
    setInterval(pollPending, 10000);
    // Initial fetch
    pollPending();
    pollActive();

    // =========================================================================
    // Lab Status Bar
    // =========================================================================
    async function pollLabStatus() {
      const data = await apiFetch('/api/lab/status');
      if (!data) return;

      const fleetEl = document.getElementById('si-fleet');
      const instEl  = document.getElementById('si-instances');
      const stepEl  = document.getElementById('si-step');
      const costEl  = document.getElementById('si-cost');

      // Fleet state
      const fleet = data.fleet || {};
      const training = data.training || {};
      const cost = data.cost || {};

      const state = (fleet.state || '--').toLowerCase();
      fleetEl.querySelector('.value').textContent = fleet.state || '--';
      fleetEl.className = 'status-item';
      const instCount = fleet.instances ? fleet.instances.length : 0;
      if (state === 'active' && instCount > 0) {
        fleetEl.classList.add('status-green');
      } else if (state === 'submitted' || state === 'modifying') {
        fleetEl.classList.add('status-yellow');
      } else {
        fleetEl.classList.add('status-red');
      }

      instEl.querySelector('.value').textContent = instCount;
      stepEl.querySelector('.value').textContent = training.step != null ? training.step : (training.status || '--');
      costEl.querySelector('.value').textContent = cost.total != null ? formatCost(cost.total) : '--';
    }

    setInterval(pollLabStatus, 30000);
    pollLabStatus();

    // =========================================================================
    // Fullscreen Toggle
    // =========================================================================
    let isFullscreen = false;

    function toggleFullscreen() {
      isFullscreen = !isFullscreen;
      document.body.classList.toggle('fullscreen', isFullscreen);
      const btn = document.getElementById('fs-toggle');
      btn.innerHTML = isFullscreen ? '&#x2716;' : '&#x26F6;';
      setTimeout(function() { fitAddon.fit(); }, 50);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && isFullscreen) {
        toggleFullscreen();
      }
    });
  </script>
</body>
</html>
