<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BitBanshee — ML Lab</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
/* ===== 1. Reset + Variables ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c0e14;
  --glass: rgba(20,22,30,0.85);
  --glass-border: rgba(255,255,255,0.08);
  --glass-border-hover: rgba(255,255,255,0.15);
  --accent: #60a5fa;
  --green: #34d399;
  --yellow: #fbbf24;
  --red: #f87171;
  --text: #e8eaed;
  --dim: #6b7280;
  --font-ui: 'SF Pro Display','SF Pro',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --font-mono: 'SF Mono','Fira Code','Consolas',monospace;
  --header-h: 48px;
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.3s ease;
}
html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font-ui);
  color: var(--text);
  background: var(--bg);
}
a { color: var(--accent); text-decoration: none; }
button { font-family: var(--font-ui); cursor: pointer; border: none; background: none; color: var(--text); }
input { font-family: var(--font-ui); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

/* ===== 2. Background + Overlay ===== */
#bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: url('https://bitbanshee.com/hero.png') center/cover no-repeat;
}
#bg-overlay {
  position: fixed; inset: 0; z-index: 1;
  background: rgba(12,14,20,0.82);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
}

/* ===== 3. Header Bar ===== */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--header-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  background: rgba(20,22,30,0.75);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--glass-border);
}
#header-left {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
  white-space: nowrap;
}
#header-left .brand-logo {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(96,165,250,0.1);
  border: 1px solid rgba(96,165,250,0.25);
  border-radius: 4px;
  padding: 2px 7px;
  line-height: 1;
}
#header-left .brand-text {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}
#header-left .brand-accent {
  color: var(--accent);
}
#header-center { position: relative; }
#project-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 14px 5px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  font-size: 13px; font-weight: 500;
  color: var(--text);
  transition: background var(--transition), border-color var(--transition);
  cursor: pointer;
}
#project-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--glass-border-hover); }
#project-btn .proj-icon { font-size: 14px; }
#project-btn .proj-name { font-weight: 600; }
#project-btn .caret { font-size: 10px; color: var(--dim); margin-left: 2px; }
#project-dropdown {
  display: none; position: absolute; top: calc(100% + 8px); left: 50%;
  transform: translateX(-50%);
  min-width: 280px;
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  overflow: hidden; z-index: 200;
  animation: dropdownIn 0.2s ease;
}
@keyframes dropdownIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
#project-dropdown.open { display: block; }
.proj-option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: background var(--transition);
}
.proj-option:hover { background: rgba(255,255,255,0.06); }
.proj-option.active { background: rgba(96,165,250,0.1); }
.proj-option .po-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
.proj-option .po-info { display: flex; flex-direction: column; }
.proj-option .po-name { font-size: 13px; font-weight: 600; }
.proj-option .po-desc { font-size: 11px; color: var(--dim); }

#header-right {
  display: flex; align-items: center; gap: 14px;
}
#health-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--dim);
}
#health-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px rgba(52,211,153,0.5);
  transition: background var(--transition), box-shadow var(--transition);
}
#health-dot.bad {
  background: var(--red);
  box-shadow: 0 0 6px rgba(248,113,113,0.5);
}
.header-btn {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  font-size: 14px;
  transition: background var(--transition);
}
.header-btn:hover { background: rgba(255,255,255,0.08); }

/* ===== 4. Main Grid Layout ===== */
#main {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0; bottom: 0;
  z-index: 10;
  display: flex;
  padding: 64px 80px;
  gap: 32px;
  flex-direction: column;
}
#cards-row {
  display: flex;
  gap: 32px;
  flex: 1;
  min-height: 0;
}
#right-col {
  flex: 40 0 0;
  display: flex;
  flex-direction: column;
  gap: 32px;
  min-width: 0;
}

/* ===== 5. Terminal Card ===== */
#terminal-card {
  flex: 60 0 0;
  display: flex;
  flex-direction: column;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  overflow: hidden;
  transition: all var(--transition);
  position: relative;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--glass-border);
  flex-shrink: 0;
}
.card-title {
  font-size: 13px; font-weight: 600; letter-spacing: -0.1px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.card-actions { display: flex; gap: 4px; }
.card-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  font-size: 13px;
  transition: background var(--transition);
}
.card-btn:hover { background: rgba(255,255,255,0.08); }
#terminal-body {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#terminal-container {
  position: absolute; inset: 0;
  padding: 4px;
}
#terminal-container .xterm { height: 100%; }

/* Terminal maximized */
#terminal-card.maximized {
  position: fixed;
  top: var(--header-h);
  left: 0; right: 0; bottom: 0;
  z-index: 50;
  border-radius: 0;
  border: none;
}

/* ===== 5b. Shell Card ===== */
#shell-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  overflow: hidden;
  transition: all var(--transition);
  position: relative;
}
#shell-body {
  flex: 1;
  position: relative;
  overflow: hidden;
}
#shell-container {
  position: absolute; inset: 0;
  padding: 4px;
}
#shell-container .xterm { height: 100%; }
#shell-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  background: rgba(15,17,23,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#shell-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

/* ===== 6. Storage Card ===== */
#storage-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  overflow: hidden;
  transition: all var(--transition);
}
#storage-body {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.storage-inner {
  display: flex;
  width: 200%;
  height: 100%;
  transition: transform 0.3s ease;
}
.storage-inner.browsing {
  transform: translateX(-50%);
}
.tiles-view {
  width: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.tiles-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  width: 100%;
  max-width: 320px;
}
.storage-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 24px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: transform var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.storage-tile:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.07);
  border-color: var(--glass-border-hover);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.storage-tile.disabled {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
}
.tile-icon { font-size: 32px; line-height: 1; }
.tile-label { font-size: 13px; font-weight: 600; }
.tile-sub { font-size: 11px; color: var(--dim); }

.browser-view {
  width: 50%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  height: 100%;
}
.browser-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--glass-border);
  flex-shrink: 0;
}
.browser-back {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  font-size: 14px;
  transition: background var(--transition);
  cursor: pointer;
  flex-shrink: 0;
}
.browser-back:hover { background: rgba(255,255,255,0.08); }
.breadcrumb {
  display: flex; align-items: center; gap: 2px;
  font-size: 12px;
  overflow-x: auto;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}
.breadcrumb::-webkit-scrollbar { height: 0; }
.bc-seg {
  color: var(--accent);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  transition: background var(--transition);
  flex-shrink: 0;
}
.bc-seg:hover { background: rgba(96,165,250,0.15); }
.bc-sep { color: var(--dim); flex-shrink: 0; margin: 0 1px; }
.file-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.file-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  cursor: pointer;
  transition: background var(--transition);
  font-size: 13px;
  user-select: none;
}
.file-item:hover { background: rgba(255,255,255,0.05); }
.file-item .fi-icon { width: 20px; text-align: center; font-size: 15px; flex-shrink: 0; }
.file-item .fi-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .fi-name.dir { color: var(--accent); font-weight: 500; }
.file-item .fi-size { color: var(--dim); font-size: 11px; flex-shrink: 0; font-family: var(--font-mono); }
.file-empty {
  display: flex; align-items: center; justify-content: center;
  flex: 1;
  color: var(--dim);
  font-size: 13px;
  padding: 40px 20px;
  text-align: center;
}
.browser-footer {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  border-top: 1px solid var(--glass-border);
  flex-shrink: 0;
}
.browser-footer-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--glass-border);
  border-radius: 8px;
  font-size: 12px;
  transition: background var(--transition), border-color var(--transition);
}
.browser-footer-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: var(--glass-border-hover);
}
.browser-footer-btn input[type="file"] { display: none; }

/* Drop zone */
.drop-zone-active .file-list {
  border: 2px dashed var(--accent);
  border-radius: 8px;
  margin: 4px 8px;
  background: rgba(96,165,250,0.05);
}

/* ===== 7. Elevation Card ===== */
#elevation-card {
  display: none;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(251,191,36,0.3);
  border-radius: var(--radius-sm);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  padding: 12px 16px;
  flex-shrink: 0;
  animation: slideDown 0.3s ease;
}
#elevation-card.visible { display: flex; align-items: center; gap: 12px; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.elev-icon { font-size: 18px; flex-shrink: 0; }
.elev-info { flex: 1; font-size: 13px; }
.elev-info strong { color: var(--yellow); }
.elev-actions { display: flex; gap: 8px; flex-shrink: 0; }
.elev-btn {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  transition: background var(--transition), transform var(--transition);
}
.elev-btn:active { transform: scale(0.96); }
.elev-btn.approve {
  background: rgba(52,211,153,0.15);
  color: var(--green);
  border: 1px solid rgba(52,211,153,0.3);
}
.elev-btn.approve:hover { background: rgba(52,211,153,0.25); }
.elev-btn.deny {
  background: rgba(248,113,113,0.15);
  color: var(--red);
  border: 1px solid rgba(248,113,113,0.3);
}
.elev-btn.deny:hover { background: rgba(248,113,113,0.25); }

/* ===== 8. Context Menu ===== */
#ctx-menu {
  display: none;
  position: fixed;
  z-index: 300;
  min-width: 180px;
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  padding: 4px 0;
  animation: ctxIn 0.15s ease;
}
#ctx-menu.open { display: block; }
@keyframes ctxIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: background var(--transition);
}
.ctx-item:hover { background: rgba(255,255,255,0.06); }
.ctx-item .ctx-icon { width: 18px; text-align: center; font-size: 13px; }
.ctx-item.danger { color: var(--red); }
.ctx-sep { height: 1px; background: var(--glass-border); margin: 4px 0; }

/* ===== 9. Toast ===== */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  padding: 10px 18px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.25s ease;
  pointer-events: auto;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.toast.out { animation: toastOut 0.2s ease forwards; }
@keyframes toastOut {
  to { opacity: 0; transform: translateY(10px); }
}

/* ===== 10. Terminal Reconnection Overlay ===== */
#term-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  background: rgba(15,17,23,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#term-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}
#term-overlay-text {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}
#term-overlay-sub {
  font-size: 13px;
  color: var(--dim);
}
#term-overlay-btn {
  padding: 10px 24px;
  background: rgba(96,165,250,0.15);
  border: 1px solid rgba(96,165,250,0.3);
  border-radius: 10px;
  color: var(--accent);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
}
#term-overlay-btn:hover { background: rgba(96,165,250,0.25); }
#term-overlay-btn:active { transform: scale(0.96); }

/* ===== 11. Animations ===== */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.loading { animation: pulse 1.5s ease infinite; }

/* ===== 12. Fullscreen / Maximized States ===== */
body.terminal-maximized #right-col,
body.terminal-maximized #elevation-card {
  display: none !important;
}
body.terminal-maximized #cards-row {
  flex: 1;
}

/* ===== 13. Mobile Responsive ===== */
@media (max-width: 767px) {
  #header-left .brand-text { display: none; }
  #cards-row {
    flex-direction: column;
  }
  #right-col {
    flex: none;
    flex-direction: row;
    height: 35vh;
  }
  #terminal-card {
    flex: none;
    height: 60vh;
  }
  #shell-card {
    flex: 1;
  }
  #storage-card {
    flex: 1;
  }
  .tiles-grid {
    grid-template-columns: repeat(3, 1fr);
    max-width: 100%;
  }
  .tiles-view {
    align-items: flex-start;
    padding: 12px;
  }
  .storage-tile {
    padding: 16px 8px;
  }
  .tile-icon { font-size: 24px; }
  #terminal-card.maximized {
    height: auto;
  }
  #main {
    padding: 12px;
    gap: 10px;
  }
}
</style>
</head>
<body>

<!-- Background -->
<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<!-- Header -->
<header id="header">
  <div id="header-left">
    <span class="brand-logo">BB</span>
    <span class="brand-text">bitbanshee<span class="brand-accent">.lab</span></span>
  </div>
  <div id="header-center">
    <button id="project-btn" onclick="toggleProjectDropdown()">
      <span class="proj-icon" id="proj-btn-icon">&#9881;&#65039;</span>
      <span class="proj-name" id="proj-btn-name">ml-lab</span>
      <span class="caret">&#9660;</span>
    </button>
    <div id="project-dropdown"></div>
  </div>
  <div id="header-right">
    <div id="health-indicator">
      <div id="health-dot"></div>
      <span id="health-text">ok</span>
    </div>
    <button class="header-btn" onclick="togglePageFullscreen()" title="Fullscreen">&#x26F6;</button>
    <a class="header-btn" href="https://bitbanshee.com" target="_blank" rel="noopener" title="bitbanshee.com">&#8599;</a>
  </div>
</header>

<!-- Main Content -->
<div id="main">
  <div id="cards-row">
    <!-- Terminal Card -->
    <div id="terminal-card">
      <div class="card-header">
        <div class="card-title">
          <span class="dot" id="term-dot"></span>
          <span>Terminal</span>
        </div>
        <div class="card-actions">
          <button class="card-btn" onclick="toggleTerminalMaximized()" title="Maximize / Restore">&#x26F6;</button>
        </div>
      </div>
      <div id="terminal-body">
        <div id="terminal-container"></div>
        <div id="term-overlay">
          <div id="term-overlay-text">Session ended</div>
          <div id="term-overlay-sub">The terminal connection was lost.</div>
          <button id="term-overlay-btn" onclick="restartTerminal()">New Session</button>
        </div>
      </div>
    </div>

    <!-- Right Column: Shell + Storage -->
    <div id="right-col">

    <!-- Shell Card -->
    <div id="shell-card">
      <div class="card-header">
        <div class="card-title">
          <span class="dot" id="shell-dot"></span>
          <span>Shell</span>
        </div>
      </div>

function escHtml(s) {

function showToast(m, dur) {
  dur = dur || 3000;

  el.className = 'toast';
  el.textContent = m;
  container.appendChild(el);
  setTimeout(function() {

    setTimeout(function() { el.remove(); }, 200);
  }, dur);
}

async function apiFetch(path, opts) {
  opts = opts || {};
  try {
    var resp = await fetch(path, opts);
    if (!resp.ok) {
      var text = await resp.text();
      throw new Error(text || resp.statusText);
    }
    var ct = resp.headers.get('content-type') || '';
    if (ct.includes('application/json')) {
      return await resp.json();
    }
    return resp;
  } catch (e) {
    showToast('Error: ' + e.message, 4000);
    throw e;
  }
}

function formatSize(bytes) {
  if (bytes == null || bytes === '') return '';
  bytes = Number(bytes);
  if (isNaN(bytes)) return '';
  if (bytes === 0) return '0 B';
  var units = ['B', 'KB', 'MB', 'GB', 'TB'];
  var i = Math.floor(Math.log(bytes) / Math.log(1024));
  if (i >= units.length) i = units.length - 1;
  var val = bytes / Math.pow(1024, i);
  return val.toFixed(i === 0 ? 0 : 1) + ' ' + units[i];
}

/* ========================================
   Terminal (xterm.js + WebSocket)
   ======================================== */
function initTerminal() {
  term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'SF Mono','Fira Code','Consolas',monospace",
    theme: {
      background: '#0f1117',
      foreground: '#e0e0e0',
      cursor: '#60a5fa',
      selectionBackground: 'rgba(96,165,250,0.25)',
      black: '#1a1d27',
      red: '#f87171',
      green: '#34d399',
      yellow: '#fbbf24',
      blue: '#60a5fa',
      magenta: '#c084fc',
      cyan: '#22d3ee',
      white: '#e0e0e0',
      brightBlack: '#4b5563',
      brightRed: '#fca5a5',
      brightGreen: '#6ee7b7',
      brightYellow: '#fde68a',
      brightBlue: '#93bbfd',
      brightMagenta: '#d8b4fe',
      brightCyan: '#67e8f9',
      brightWhite: '#f9fafb'
    },
    allowProposedApi: true
  });

  fitAddon = new FitAddon.FitAddon();
  var webLinksAddon = new WebLinksAddon.WebLinksAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(webLinksAddon);
  term.open(document.getElementById('terminal-container'));
  fitAddon.fit();

  var ro = new ResizeObserver(function() {
    try { fitAddon.fit(); } catch (e) {}
    if (ws && ws.readyState === WebSocket.OPEN && term.cols && term.rows) {
      var resizeMsg = JSON.stringify({ columns: term.cols, rows: term.rows });
      var enc = new TextEncoder().encode(resizeMsg);
      var buf = new Uint8Array(enc.length + 1);
      buf[0] = 0x31;
      buf.set(enc, 1);
      ws.send(buf);
    }
  });
  ro.observe(document.getElementById('terminal-body'));

  term.onData(function(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      var enc = new TextEncoder().encode(data);
      var buf = new Uint8Array(enc.length + 1);
      buf[0] = 0x30;
      buf.set(enc, 1);
      ws.send(buf);
    }
  });

  term.onBinary(function(data) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      var buf = new Uint8Array(data.length + 1);
      buf[0] = 0x30;
      for (var i = 0; i < data.length; i++) {
        buf[i + 1] = data.charCodeAt(i) & 0xFF;
      }
      ws.send(buf);
    }
  });

  connectTerminal();
}

function connectTerminal() {
  if (ws) {
    try { ws.close(); } catch (e) {}
  }
  var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = protocol + '//' + location.host + '/terminal/ws';
  ws = new WebSocket(url, ['tty']);
  ws.binaryType = 'arraybuffer';

  ws.onopen = function() {
    wsRetries = 0;
    hideTerminalOverlay();
    setHealth(true);
    document.getElementById('term-dot').style.background = 'var(--green)';
    var authMsg = JSON.stringify({ AuthToken: '', columns: term.cols, rows: term.rows });
    ws.send(new TextEncoder().encode(authMsg));
  };

  ws.onmessage = function(ev) {
    if (typeof ev.data === 'string') {
      term.write(ev.data);
      return;
    }
    var data = new Uint8Array(ev.data);
    if (data.length < 1) return;
    var cmd = data[0];
    var payload = data.slice(1);
    if (cmd === 0x30) {
      term.write(payload);
    } else if (cmd === 0x31) {
      var titleStr = new TextDecoder().decode(payload);
      document.title = titleStr || "BitBanshee's Brain";
    }
  };

  ws.onclose = function() {
    setHealth(false);
    document.getElementById('term-dot').style.background = 'var(--red)';
    wsRetries++;
    if (wsRetries <= maxRetries) {
      clearTimeout(wsTimer);
      wsTimer = setTimeout(connectTerminal, 3000);
    } else {
      showTerminalOverlay();
    }
  };

  ws.onerror = function() {
    // onclose will fire after this
  };
}

function showTerminalOverlay() {
  document.getElementById('term-overlay-text').textContent = 'Session ended';
  document.getElementById('term-overlay-sub').textContent = 'The terminal connection was lost.';
  document.getElementById('term-overlay').classList.add('visible');
}

function hideTerminalOverlay() {
  document.getElementById('term-overlay').classList.remove('visible');
}

async function restartTerminal() {
  document.getElementById('term-overlay-text').textContent = 'Starting session...';
  document.getElementById('term-overlay-sub').textContent = '';
  try {
    await apiFetch('/api/terminal/restart', { method: 'POST' });
  } catch (e) {
    // Will try to reconnect anyway
  }
  wsRetries = 0;
  setTimeout(connectTerminal, 2000);
}

}

      buf.set(enc, 1);
      shellWs.send(buf);
    }
  });
  ro.observe(document.getElementById('shell-body'));

  shellTerm.onData(function(data) {
    if (shellWs && shellWs.readyState === WebSocket.OPEN) {
      var enc = new TextEncoder().encode(data);
      var buf = new Uint8Array(enc.length + 1);
      buf[0] = 0x30;
      buf.set(enc, 1);
      shellWs.send(buf);
    }
  });

  shellTerm.onBinary(function(data) {
    if (shellWs && shellWs.readyState === WebSocket.OPEN) {
      var buf = new Uint8Array(data.length + 1);
      buf[0] = 0x30;
      for (var i = 0; i < data.length; i++) {
        buf[i + 1] = data.charCodeAt(i) & 0xFF;
      }
      shellWs.send(buf);
    }
  });

  connectShell();
}

function connectShell() {
  if (shellWs) { try { shellWs.close(); } catch (e) {} }
  var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var url = protocol + '//' + location.host + '/api/shell/ws';
  shellWs = new WebSocket(url, ['tty']);
  shellWs.binaryType = 'arraybuffer';

  shellWs.onopen = function() {
    shellWsRetries = 0;
    document.getElementById('shell-overlay').classList.remove('visible');
    document.getElementById('shell-dot').style.background = 'var(--green)';
    var authMsg = JSON.stringify({ AuthToken: '', columns: shellTerm.cols, rows: shellTerm.rows });
    shellWs.send(new TextEncoder().encode(authMsg));
  };

  shellWs.onmessage = function(ev) {
    if (typeof ev.data === 'string') { shellTerm.write(ev.data); return; }
    var data = new Uint8Array(ev.data);
    if (data.length < 1) return;
    if (data[0] === 0x30) { shellTerm.write(data.slice(1)); }
  };

  shellWs.onclose = function() {
    document.getElementById('shell-dot').style.background = 'var(--red)';
    shellWsRetries++;
    if (shellWsRetries <= 3) {
      clearTimeout(shellWsTimer);
      shellWsTimer = setTimeout(connectShell, 3000);
    } else {
      document.getElementById('shell-overlay').classList.add('visible');
    }
  };

  shellWs.onerror = function() {};
}

async function restartShell() {
  try {
    await apiFetch('/api/shell/restart', { method: 'POST' });
  } catch (e) {}
  shellWsRetries = 0;

}

/* ---- Breadcrumb Rendering ---- */
function renderBreadcrumb(type, pathOrPrefix) {
  var bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';

  if (type === 'local') {
    var homePath = '/home/claude-operator';
    var display = pathOrPrefix;
    if (pathOrPrefix.startsWith(homePath)) {
      display = '~' + pathOrPrefix.slice(homePath.length);
    }
    var parts = display.split('/').filter(Boolean);
    if (display.startsWith('~')) {
      // First part is ~ replacement
    }

    var segments = [];
    if (pathOrPrefix.startsWith(homePath)) {
      segments.push({ label: '~', path: homePath });
      var rest = pathOrPrefix.slice(homePath.length);
      var restParts = rest.split('/').filter(Boolean);
      var acc = homePath;
      restParts.forEach(function(p) {
        acc += '/' + p;
        segments.push({ label: p, path: acc });
      });
    } else {
      var accPath = '';
      var allParts = pathOrPrefix.split('/').filter(Boolean);
      segments.push({ label: '/', path: '/' });
      allParts.forEach(function(p) {
        accPath += '/' + p;
        segments.push({ label: p, path: accPath });
      });
    }

    segments.forEach(function(seg, idx) {
      if (idx > 0) {
        var sep = document.createElement('span');
        sep.className = 'bc-sep';
        sep.textContent = '/';
        bc.appendChild(sep);
      }
      var el = document.createElement('span');
      el.className = 'bc-seg';
      el.textContent = seg.label;
      el.addEventListener('click', function() { loadLocalDir(seg.path); });
      bc.appendChild(el);
    });
  } else {
    // S3
    var segments2 = [];
    segments2.push({ label: S3_BUCKET, prefix: '' });
    if (pathOrPrefix) {
      var prefixParts = pathOrPrefix.split('/').filter(Boolean);
      var accPfx = '';
      prefixParts.forEach(function(p) {
        accPfx += p + '/';
        segments2.push({ label: p, prefix: accPfx });
      });
    }

    segments2.forEach(function(seg, idx) {
      if (idx > 0) {
        var sep = document.createElement('span');
        sep.className = 'bc-sep';
        sep.textContent = '/';
        bc.appendChild(sep);
      }
      var el = document.createElement('span');
      el.className = 'bc-seg';
      el.textContent = seg.label;
      el.addEventListener('click', function() { loadS3Dir(seg.prefix); });
      bc.appendChild(el);
    });
  }
}

/* ---- File List Rendering ---- */
function renderFileList(data, type) {
  var listEl = document.getElementById('file-list');
  listEl.innerHTML = '';

  var items = (data && data.entries) ? data.entries : [];

  if (items.length === 0) {
    listEl.innerHTML = '<div class="file-empty">Empty directory</div>';
    return;
  }

  // API already sorts dirs first, but ensure it
  items.sort(function(a, b) {
    var aDir = a.type === 'dir';
    var bDir = b.type === 'dir';
    if (aDir && !bDir) return -1;
    if (!aDir && bDir) return 1;
    return (a.name || '').localeCompare(b.name || '');
  });

  items.forEach(function(item) {
    var isDir = item.type === 'dir';
    var div = document.createElement('div');
    div.className = 'file-item';

    var icon = isDir ? '\uD83D\uDCC1' : getFileIcon(item.name);
    var nameClass = isDir ? 'fi-name dir' : 'fi-name';
    var sizeStr = isDir ? '' : formatSize(item.size);

    div.innerHTML =
      '<span class="fi-icon">' + icon + '</span>' +
      '<span class="' + nameClass + '">' + escHtml(item.name) + '</span>' +
      (sizeStr ? '<span class="fi-size">' + escHtml(sizeStr) + '</span>' : '');

    div.addEventListener('click', function() {
      if (isDir) {
        if (type === 'local') {
          loadLocalDir(localPath.replace(/\/$/, '') + '/' + item.name);
        } else {
          loadS3Dir(s3Prefix + item.name + '/');
        }
      }
    });

    div.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      showContextMenu(e, item, type);
    });

    listEl.appendChild(div);
  });
}

/* ========================================
   Context Menu
   ======================================== */
function showContextMenu(e, item, type) {
  ctxTarget = { item: item, type: type };
  var menu = document.getElementById('ctx-menu');
  menu.innerHTML = '';

  if (item.type !== 'dir') {
    var dlItem = document.createElement('div');
    dlItem.className = 'ctx-item';
    dlItem.innerHTML = '<span class="ctx-icon">&#8595;</span> Download';
    dlItem.addEventListener('click', function() { downloadFile(item, type); closeContextMenu(); });
    menu.appendChild(dlItem);
  }

  var openItem = document.createElement('div');
  openItem.className = 'ctx-item';
  openItem.innerHTML = '<span class="ctx-icon">&#9654;</span> Open in terminal';
  openItem.addEventListener('click', function() { openInTerminal(item, type); closeContextMenu(); });
  menu.appendChild(openItem);

  var copyItem = document.createElement('div');
  copyItem.className = 'ctx-item';
  copyItem.innerHTML = '<span class="ctx-icon">&#128203;</span> Copy path';
  copyItem.addEventListener('click', function() { copyPath(item, type); closeContextMenu(); });
  menu.appendChild(copyItem);

  var sep = document.createElement('div');
  sep.className = 'ctx-sep';
  menu.appendChild(sep);

  var delItem = document.createElement('div');
  delItem.className = 'ctx-item danger';
  delItem.innerHTML = '<span class="ctx-icon">&#128465;</span> Delete';
  delItem.addEventListener('click', function() { deleteFile(item, type); closeContextMenu(); });
  menu.appendChild(delItem);

  // Position
  var x = e.clientX;
  var y = e.clientY;
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  menu.classList.add('open');

  // Adjust if off screen
  requestAnimationFrame(function() {
    var rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) {
      menu.style.left = (window.innerWidth - rect.width - 8) + 'px';
    }
    if (rect.bottom > window.innerHeight) {
      menu.style.top = (window.innerHeight - rect.height - 8) + 'px';
    }
  });
}

function closeContextMenu() {
  document.getElementById('ctx-menu').classList.remove('open');
  ctxTarget = null;
}

function downloadFile(item, type) {
  if (type === 'local') {
    var path = localPath.replace(/\/$/, '') + '/' + item.name;
    window.open('/api/fs/local/download?path=' + encodeURIComponent(path), '_blank');
  } else {
    var key = s3Prefix + item.name;
    window.open('/api/fs/s3/download?bucket=' + encodeURIComponent(S3_BUCKET) + '&key=' + encodeURIComponent(key), '_blank');
  }
}

function openInTerminal(item, type) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  var cmd;
  var isDir = item.type === 'dir';
  if (type === 'local') {
    var fullPath = localPath.replace(/\/$/, '') + '/' + item.name;
    if (isDir) {
      cmd = 'cd ' + fullPath + '\n';
    } else {
      cmd = 'less ' + fullPath + '\n';
    }
  } else {
    var key = s3Prefix + item.name;
    if (isDir) {
      cmd = 'aws s3 ls s3://' + S3_BUCKET + '/' + key + '\n';
    } else {
      cmd = 'aws s3 cp s3://' + S3_BUCKET + '/' + key + ' -\n';
    }
  }
  var enc = new TextEncoder().encode(cmd);
  var buf = new Uint8Array(enc.length + 1);
  buf[0] = 0x30;
  buf.set(enc, 1);
  ws.send(buf);
  showToast('Sent to terminal');
}

function copyPath(item, type) {
  var path;
  if (type === 'local') {
    path = localPath.replace(/\/$/, '') + '/' + item.name;
  } else {
    path = 's3://' + S3_BUCKET + '/' + s3Prefix + item.name;
  }
  navigator.clipboard.writeText(path).then(function() {
    showToast('Copied: ' + path);
  }).catch(function() {
    showToast('Failed to copy');
  });
}

async function deleteFile(item, type) {
  var name = item.name;
  if (!confirm('Delete "' + name + '"?')) return;

  try {
    if (type === 'local') {
      var path = localPath.replace(/\/$/, '') + '/' + name;
      await apiFetch('/api/fs/local/delete?path=' + encodeURIComponent(path), { method: 'DELETE' });
      showToast('Deleted ' + name);
      loadLocalDir(localPath);
    } else {
      showToast('S3 delete not supported from browser');
    }
  } catch (e) {}
}

/* ========================================
   Upload + Mkdir
   ======================================== */
function triggerUpload() {
  document.getElementById('upload-input').click();
}

async function handleUpload(files) {
  if (!files || files.length === 0) return;
  for (var i = 0; i < files.length; i++) {
    var fd = new FormData();
    fd.append('file', files[i]);
    try {
      await apiFetch('/api/fs/local/upload?path=' + encodeURIComponent(localPath), {
        method: 'POST',
        body: fd
      });
      showToast('Uploaded ' + files[i].name);
    } catch (e) {}
  }
  document.getElementById('upload-input').value = '';
  loadLocalDir(localPath);
}

async function promptMkdir() {
  var name = prompt('New folder name:');
  if (!name) return;
  try {
    await apiFetch('/api/fs/local/mkdir?path=' + encodeURIComponent(localPath.replace(/\/$/, '') + '/' + name), {
      method: 'POST'
    });
    showToast('Created folder ' + name);
    loadLocalDir(localPath);
  } catch (e) {}
}

/* ---- Drag & Drop ---- */
function initDragDrop() {
  var browserView = document.getElementById('browser-view');

  browserView.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCounter++;
    if (activeStorage === 'local') {
      browserView.classList.add('drop-zone-active');
    }
  });

  browserView.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) {
      dragCounter = 0;
      browserView.classList.remove('drop-zone-active');
    }
  });

  browserView.addEventListener('dragover', function(e) {
    e.preventDefault();
  });

  browserView.addEventListener('drop', function(e) {
    e.preventDefault();
    dragCounter = 0;
    browserView.classList.remove('drop-zone-active');
    if (activeStorage === 'local' && e.dataTransfer && e.dataTransfer.files.length > 0) {
      handleUpload(e.dataTransfer.files);
    }
  });
}

/* ========================================
   Fullscreen
   ======================================== */
function togglePageFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(function() {});
  } else {
    document.exitFullscreen().catch(function() {});
  }
}

/* ========================================
   Keyboard Shortcuts
   ======================================== */
document.addEventListener('keydown', function(e) {
  // Ctrl+Shift+F — page fullscreen
  if (e.ctrlKey && e.shiftKey && e.key === 'F') {
    e.preventDefault();
    togglePageFullscreen();
    return;
  }
  // Ctrl+Shift+T — maximize/restore terminal
  if (e.ctrlKey && e.shiftKey && e.key === 'T') {
    e.preventDefault();
    toggleTerminalMaximized();
    return;
  }
  // Escape — close overlays, restore terminal
  if (e.key === 'Escape') {
    closeDropdowns();
    if (terminalMaximized) {
      toggleTerminalMaximized();
    }
    return;
  }
});

/* ========================================
   Global Click Handler
   ======================================== */
document.addEventListener('click', function(e) {
  // Close project dropdown if click outside
  var dd = document.getElementById('project-dropdown');
  var btn = document.getElementById('project-btn');
  if (dd.classList.contains('open') && !dd.contains(e.target) && !btn.contains(e.target)) {
    dd.classList.remove('open');
  }
  // Close context menu if click outside
  var ctx = document.getElementById('ctx-menu');
  if (ctx.classList.contains('open') && !ctx.contains(e.target)) {
    closeContextMenu();
  }
});

/* ========================================
   Init
   ======================================== */
document.addEventListener('DOMContentLoaded', function() {
  buildProjectDropdown();
  initTerminal();
  initShell();
  initDragDrop();

  // Restore maximized state
  if (terminalMaximized) {
    document.getElementById('terminal-card').classList.add('maximized');
    document.body.classList.add('terminal-maximized');
  }

  // Restore active storage browser
  if (activeStorage === 'local' || activeStorage === 's3') {
    openStorageBrowser(activeStorage);
  }

  // Start polling
  pollHealth();
  pollElevation();
  healthTimer = setInterval(pollHealth, 15000);
  elevTimer = setInterval(pollElevation, 15000);
});
</script>
